{% extends 'base.html' %}

{% block content %}

<h2 class="text-2xl font-bold mb-6 text-gray-700">PDF to Images</h2>

<form method="POST" enctype="multipart/form-data"
      class="space-y-4">
    {% csrf_token %}

    <input type="file" name="file"
           class="block w-full border p-3 rounded-lg shadow-sm">

    <button type="submit"
            class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg shadow-md">
        Convert
    </button>
</form>

{% endblock %}
